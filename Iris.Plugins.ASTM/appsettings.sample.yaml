# Sample configuration for Iris.Plugins.ASTM
# Copy this file to appsettings.yaml and adjust values for your environment.

Astm:
  # Hostname or IP address of the laboratory instrument (TCP target).
  Host: "127.0.0.1"

  # TCP port number the instrument is listening on.
  Port: 1234

  # Unique identifier for this instrument instance.
  # Used to build MQTT topics:
  #   astm/results/{InstrumentId}
  #   astm/orders/{InstrumentId}
  #   astm/status/{InstrumentId}
  InstrumentId: "analyzer-01"

  # Text encoding for ASTM message strings.
  # ASCII is mandated by ASTM E1381 and is the recommended value.
  Encoding: "ASCII"

  # How long (in milliseconds) to wait for an acknowledgement before timing out.
  AcknowledgeTimeoutMs: 5000

  # Delay in milliseconds between connection retry attempts.
  RetryDelayMs: 5000

  # Maximum number of data bytes per ASTM frame.
  # ASTM E1381 specifies a maximum of 240 bytes.
  MaxFrameDataBytes: 240
